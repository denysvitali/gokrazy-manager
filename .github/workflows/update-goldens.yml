name: Update Golden Images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-goldens:
    name: Regenerate Golden Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: stable

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml', '**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get dependencies
        run: flutter pub get

      - name: Regenerate golden images
        run: |
          if [ ! -d test/goldens ]; then
            echo "No golden tests configured"
            exit 0
          fi
          flutter test --update-goldens test/goldens/

      - name: Commit updated goldens
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test/goldens/
          if git diff --cached --quiet; then
            echo "No golden changes detected"
          else
            git commit -m "test(goldens): regenerate images"
            git push
          fi
