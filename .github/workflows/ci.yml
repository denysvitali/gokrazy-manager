name: Gokrazy Manager CI/CD

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type to produce'
        required: true
        default: 'both'
        type: choice
        options:
          - debug
          - release
          - both
      flavor:
        description: 'App flavor (environment)'
        required: true
        default: 'production'
        type: choice
        options:
          - development
          - preview
          - production

env:
  DART_VM_OPTIONS: '--max-gen-heap-size=4096'

permissions:
  contents: write

jobs:
  # Run analyze and test in parallel. Both need pub get but are independent after.
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.6

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml', '**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.6


      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml', '**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 1
          if-no-files-found: ignore

  coverage:
    name: Upload Coverage
    needs: test
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    if: always() && needs.test.result == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-report
          path: coverage-shards

      - name: Merge coverage reports
        run: |
          mkdir -p coverage
          LCOV_FILE="$(find coverage-shards -type f -name lcov.info | head -n 1)"
          if [ -z "$LCOV_FILE" ]; then
            echo "No lcov report found in coverage-shards"
            exit 1
          fi
          cp "$LCOV_FILE" coverage/lcov.info
          echo "Merged coverage report"
          echo "Total lines: $(wc -l < coverage/lcov.info)"
          echo "Source files: $(grep -c '^SF:' coverage/lcov.info)"

      - name: Install curl
        run: sudo apt-get update && sudo apt-get install -y curl

      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: true

  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      KEYSTORE_KEY_ALIAS: upload
    # Debug builds are manual-only. Pushes publish release APKs.
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.build_type == 'debug' ||
       github.event.inputs.build_type == 'both')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine build metadata
        shell: bash
        id: build_meta
        run: |
          BUILD_NUMBER=$(( ${{ github.run_number }} * 100 + ${{ github.run_attempt }} ))
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT

      - name: Prepare signing keystore (optional)
        id: debug_keystore
        shell: bash
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_PATH=" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > ci-keystore.jks
          echo "KEYSTORE_PATH=${{ github.workspace }}/ci-keystore.jks" >> $GITHUB_OUTPUT
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Free disk space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /opt/microsoft/powershell
          sudo rm -rf /usr/local/share/chromedriver-linux64
          sudo rm -rf /usr/local/share/edge_driver
          sudo rm -rf /usr/local/share/gecko_driver
          sudo rm -rf /usr/share/swift
          df -h

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.6

      - name: Setup Android NDK
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses || true
          "$SDKMANAGER" "ndk;28.2.13676358"

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml', '**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Get dependencies
        run: flutter pub get

      - name: Stabilize Kotlin compiler
        run: |
          mkdir -p ~/.gradle
          {
            echo 'kotlin.compiler.execution.strategy=in-process'
          } >> ~/.gradle/gradle.properties

      - name: Determine flavor
        id: flavor
        run: |
          FLAVOR="${{ github.event.inputs.flavor }}"
          if [ -z "$FLAVOR" ]; then
            FLAVOR="production"
          fi
          echo "FLAVOR=$FLAVOR" >> $GITHUB_OUTPUT

      - name: Build Debug APK
        run: |
          flutter build apk --debug --no-pub \
            --target-platform android-arm64 \
            --build-number ${{ steps.build_meta.outputs.BUILD_NUMBER }} \
            --dart-define=SENTRY_RELEASE=gokrazy_manager@0.1.0+${{ steps.build_meta.outputs.BUILD_NUMBER }}
        env:
          APP_ENV: ${{ steps.flavor.outputs.FLAVOR }}
          KEYSTORE_PATH: ${{ steps.debug_keystore.outputs.KEYSTORE_PATH }}
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: gokrazy-manager-debug-${{ steps.flavor.outputs.FLAVOR }}-b${{ steps.build_meta.outputs.BUILD_NUMBER }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      KEYSTORE_KEY_ALIAS: upload
    # Build a release APK for every commit pushed to a tracked branch, manual
    # release builds, and version tags.
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'both')) ||
      startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine build metadata
        shell: bash
        id: build_meta
        run: |
          BUILD_NUMBER=$(( ${{ github.run_number }} * 100 + ${{ github.run_attempt }} ))
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT

      - name: Check for keystore
        id: check_keystore
        shell: bash
        run: |
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$KEYSTORE_STORE_PASSWORD" ] || [ -z "$KEYSTORE_KEY_PASSWORD" ]; then
            echo "ENABLED=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Release build skipped. KEYSTORE_BASE64, KEYSTORE_STORE_PASSWORD, and KEYSTORE_KEY_PASSWORD are required."
            exit 0
          fi
          echo "ENABLED=true" >> "$GITHUB_OUTPUT"
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}

      - name: Free disk space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /opt/microsoft/powershell
          sudo rm -rf /usr/local/share/chromedriver-linux64
          sudo rm -rf /usr/local/share/edge_driver
          sudo rm -rf /usr/local/share/gecko_driver
          sudo rm -rf /usr/share/swift
          df -h

      - name: Create keystore
        if: ${{ steps.check_keystore.outputs.ENABLED == 'true' }}
        shell: bash
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > release-keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Resolve signing keystore
        if: ${{ steps.check_keystore.outputs.ENABLED == 'true' }}
        id: resolve_keystore
        shell: bash
        run: |
          KEYSTORE_STORE_PASSWORD="$(printf '%s' "$KEYSTORE_STORE_PASSWORD" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          KEYSTORE_KEY_PASSWORD="$(printf '%s' "$KEYSTORE_KEY_PASSWORD" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          if [ -z "$KEYSTORE_STORE_PASSWORD" ]; then
            echo "::error::KEYSTORE_STORE_PASSWORD is empty after trimming"
            exit 1
          fi

          KEYSTORE_LIST="$(keytool -list \
            -v \
            -keystore release-keystore.jks \
            -storepass "$KEYSTORE_STORE_PASSWORD" \
            2>&1 || true)"
          if [ -z "$KEYSTORE_LIST" ]; then
            echo "::error::Could not read keystore output from keytool"
            exit 1
          fi

          if echo "$KEYSTORE_LIST" | grep -qi "keystore password was incorrect"; then
            echo "::error::Invalid KEYSTORE_STORE_PASSWORD"
            exit 1
          fi

          if echo "$KEYSTORE_LIST" | grep -qi "keystore was tampered"; then
            echo "::error::Invalid KEYSTORE_STORE_PASSWORD"
            exit 1
          fi

          if echo "$KEYSTORE_LIST" | grep -qi "is not a valid keystore"; then
            echo "::error::release-keystore.jks is not a valid keystore or KEYSTORE_BASE64 is corrupt"
            exit 1
          fi

          mapfile -t AVAILABLE_ALIASES < <(
            printf '%s\n' "$KEYSTORE_LIST" \
            | sed -nE "s/^[[:space:]]*[Aa]lias[[:space:]]*name:[[:space:]]*([^,]+).*/\\1/p"
          )

          if [ "${#AVAILABLE_ALIASES[@]}" -eq 0 ]; then
            KEYSTORE_RFC_LIST="$(keytool -list \
              -rfc \
              -keystore release-keystore.jks \
              -storepass "$KEYSTORE_STORE_PASSWORD" \
              2>&1 || true)"
            mapfile -t AVAILABLE_ALIASES < <(
              printf '%s\n' "$KEYSTORE_RFC_LIST" \
              | sed -nE "s/^[[:space:]]*[Aa]lias:[[:space:]]*([^[:space:]]+).*/\\1/p"
            )
          fi

          if [ "${#AVAILABLE_ALIASES[@]}" -eq 0 ]; then
            echo "::error::Could not parse keystore aliases from keytool output"
            echo "::warning::Keytool output head (redacted):"
            printf '%s\n' "$KEYSTORE_LIST" | sed -n '1,6p' | sed 's/\x1b\\[[0-9;]*m//g'
            exit 1
          fi

          KEY_ALIAS="$KEYSTORE_KEY_ALIAS"
          if [ -n "$KEY_ALIAS" ]; then
            ALIAS_FOUND="false"
            for ALIAS in "${AVAILABLE_ALIASES[@]}"; do
              if [ "$ALIAS" = "$KEY_ALIAS" ]; then
                ALIAS_FOUND="true"
                break
              fi
            done

            if [ "$ALIAS_FOUND" != "true" ]; then
              KEY_ALIAS=""
            fi
          fi

          if [ -z "$KEY_ALIAS" ]; then
            echo "::warning::Configured key alias not found, using first available alias"
            KEY_ALIAS="${AVAILABLE_ALIASES[0]}"
          fi

          if [ -z "$KEY_ALIAS" ]; then
            echo "::error::Release keystore alias missing or invalid"
            exit 1
          fi

          echo "Using keystore alias: $KEY_ALIAS"

          KEY_CANDIDATES=("${KEYSTORE_KEY_PASSWORD}" "${KEYSTORE_STORE_PASSWORD}")
          EFFECTIVE_KEY_PASSWORD=""
          for KEY_PASSWORD in "${KEY_CANDIDATES[@]}"; do
            if [ -z "$KEY_PASSWORD" ]; then
              continue
            fi

            if keytool -importkeystore \
              -srckeystore release-keystore.jks \
              -srcstorepass "$KEYSTORE_STORE_PASSWORD" \
              -srcalias "$KEY_ALIAS" \
              -srckeypass "$KEY_PASSWORD" \
              -destkeystore /tmp/release-keystore.resolved.p12 \
              -deststoretype PKCS12 \
              -deststorepass resolvedpass \
              -destkeypass resolvedpass \
              -noprompt; then
              EFFECTIVE_KEY_PASSWORD="$KEY_PASSWORD"
              RESOLVED_KEYSTORE_PASSWORD="resolvedpass"
              break
            fi
          done

          if [ -z "$EFFECTIVE_KEY_PASSWORD" ]; then
            echo "::error::Release keystore secrets are invalid"
            exit 1
          fi

          {
            echo "KEYSTORE_KEY_ALIAS=$KEY_ALIAS"
            echo "KEYSTORE_KEY_PASSWORD=$RESOLVED_KEYSTORE_PASSWORD"
            echo "KEYSTORE_STORE_PASSWORD=$RESOLVED_KEYSTORE_PASSWORD"
            echo "KEYSTORE_PATH=/tmp/release-keystore.resolved.p12"
          } >> "$GITHUB_OUTPUT"
        env:
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ env.KEYSTORE_KEY_ALIAS }}

      - name: Setup Java
        if: ${{ steps.check_keystore.outputs.ENABLED == 'true' }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Flutter
        if: ${{ steps.check_keystore.outputs.ENABLED == 'true' }}
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.6

      - name: Setup Android NDK
        if: ${{ steps.check_keystore.outputs.ENABLED == 'true' }}
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses || true
          "$SDKMANAGER" "ndk;28.2.13676358"

      - name: Cache pub dependencies
        if: ${{ steps.check_keystore.outputs.ENABLED == 'true' }}
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml', '**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Gradle
        if: ${{ steps.check_keystore.outputs.ENABLED == 'true' }}
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Get dependencies
        if: ${{ steps.check_keystore.outputs.ENABLED == 'true' }}
        run: flutter pub get

      - name: Stabilize Kotlin compiler
        if: ${{ steps.check_keystore.outputs.ENABLED == 'true' }}
        run: |
          mkdir -p ~/.gradle
          {
            echo 'kotlin.compiler.execution.strategy=in-process'
          } >> ~/.gradle/gradle.properties

      - name: Determine flavor
        if: ${{ steps.check_keystore.outputs.ENABLED == 'true' }}
        id: flavor
        run: |
          FLAVOR="${{ github.event.inputs.flavor }}"
          if [ -z "$FLAVOR" ]; then
            FLAVOR="production"
          fi
          echo "FLAVOR=$FLAVOR" >> $GITHUB_OUTPUT

      - name: Build Release APK
        id: build_release
        if: ${{ steps.check_keystore.outputs.ENABLED == 'true' }}
        env: 
          APP_ENV: ${{ steps.flavor.outputs.FLAVOR }}
          KEYSTORE_PATH: ${{ steps.resolve_keystore.outputs.KEYSTORE_PATH }}
          KEYSTORE_STORE_PASSWORD: ${{ steps.resolve_keystore.outputs.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ steps.resolve_keystore.outputs.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ steps.resolve_keystore.outputs.KEYSTORE_KEY_PASSWORD }}
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g'
        run: |
          set -o pipefail
          flutter build apk --release --no-pub \
            --target-platform android-arm64 \
            --build-number ${{ steps.build_meta.outputs.BUILD_NUMBER }} \
            --dart-define=SENTRY_RELEASE=gokrazy_manager@0.1.0+${{ steps.build_meta.outputs.BUILD_NUMBER }} \
            --verbose 2>&1 | tee build-release.log

      - name: Upload release build log
        if: ${{ steps.check_keystore.outputs.ENABLED == 'true' && always() }}
        uses: actions/upload-artifact@v7
        with:
          name: release-build-log-${{ steps.flavor.outputs.FLAVOR }}-b${{ steps.build_meta.outputs.BUILD_NUMBER }}
          path: build-release.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload debug symbols to Sentry
        if: ${{ steps.check_keystore.outputs.ENABLED == 'true' && env.SENTRY_AUTH_TOKEN != '' }}
        run: |
          flutter pub run sentry_dart_plugin
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DIST: ${{ steps.build_meta.outputs.BUILD_NUMBER }}
          SENTRY_RELEASE: gokrazy_manager@0.1.0+${{ steps.build_meta.outputs.BUILD_NUMBER }}

      - name: Upload Release APK
        if: ${{ steps.check_keystore.outputs.ENABLED == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: gokrazy-manager-release-${{ steps.flavor.outputs.FLAVOR }}-b${{ steps.build_meta.outputs.BUILD_NUMBER }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      - name: Determine release version
        if: ${{ steps.check_keystore.outputs.ENABLED == 'true' }}
        id: release_version
        run: |
          SEMVER=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | cut -d'+' -f1 | tr -d ' ')
          BUILD_NUMBER="${{ steps.build_meta.outputs.BUILD_NUMBER }}"
          RELEASE_TAG="v${SEMVER}+${BUILD_NUMBER}"
          RELEASE_NAME="Gokrazy Manager v${SEMVER} (build ${BUILD_NUMBER})"
          echo "SEMVER=$SEMVER" >> $GITHUB_OUTPUT
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: ${{ steps.check_keystore.outputs.ENABLED == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_version.outputs.RELEASE_TAG }}
          name: ${{ steps.release_version.outputs.RELEASE_NAME }}
          draft: false
          prerelease: true
          generate_release_notes: false
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
