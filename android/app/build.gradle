plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
def keystorePath = System.getenv('KEYSTORE_PATH')
def keystoreStorePassword = System.getenv('KEYSTORE_STORE_PASSWORD')
def keystoreKeyPassword = System.getenv('KEYSTORE_KEY_PASSWORD')
def keystoreKeyAlias = System.getenv('KEYSTORE_KEY_ALIAS')

android {
    namespace "it.denv.gokrazymanager"
    compileSdk flutter.compileSdkVersion
    ndkVersion "28.2.13676358"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "it.denv.gokrazymanager"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        debug {
            keyAlias keystoreKeyAlias ?: keystoreProperties['keyAlias']
            keyPassword keystoreKeyPassword ?: keystoreProperties['keyPassword']
            storeFile keystorePath ? file(keystorePath) : (keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null)
            storePassword keystoreStorePassword ?: keystoreProperties['storePassword']
        }

        release {
            keyAlias keystoreKeyAlias ?: keystoreProperties['keyAlias']
            keyPassword keystoreKeyPassword ?: keystoreProperties['keyPassword']
            storeFile keystorePath ? file(keystorePath) : (keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null)
            storePassword keystoreStorePassword ?: keystoreProperties['storePassword']
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            applicationIdSuffix ".debug"
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
        }
    }
}

flutter {
    source '../..'
}

dependencies {}
